<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação do Primeiro site</title>
</head>
<body>

    <img src ="/web_design/img/natan.png" alt style =" width:25%;" alt = "uma pessoa andando na praita"> 

    <!--O (img) serve para colocar imagens no html, mas tem que ta na pasto img dentro da pasta do index.html-->
    <!--O alt style serve com o comando em "width: 50%:" para modificar o tamanho da imagem no site-->
    <!--O alt serve como legenda da imagem-->

    <h1>Natan Malta</h1>
    <p><em>Estudante de ciencia da computação</em></p>  <!-- o (em) serve para deixar ele em italico-->
    <p><strong>Pratica de html basico</strong></p>  <!--o (Strong) serve para deixar a letra forte-->
    
    <hr size/> <!--o hr serve para criar uma linha e o size serve para aumentar ela-->

    <h2>Materiais de Estudo</h2>
        <ul>    <!--O (ul) serve para representar uma lista de itens(nao ordenanda)--> 
            <li>Curso full stark turbo</li>  <!--O (li) cria essa ordem para a lista-->
            <li>Muita fé</li>
            <li>E um notebook</li>
        </ul>
    <h2>O que gosto de fazer</h2> 
        <ol>  <!-- O (ol) é parecido com o (ul) pois ele cria uma lista, mas o foco dele é criar uma lista ordenada numerica-->
            <li>ler livros</li>
            <li>praticar jiu-jitsu</li>
            <li>Aprender algo novo</li>
        </ol>

    <a href="https://www.linkedin.com/in/natan-malta-080643299/" target ="_blank">Linkedin</a>  <!--A tag (a) serve para ancorar um site-->
   <!--E o (target = "_blanck") serve para abrir o site em outra aba, vez de abrir no proprio siter-->

   <h1><a href="/web_design/contato/contato.html" target="_blank"> Entre em contato</a></h1>


</body>

</html>
