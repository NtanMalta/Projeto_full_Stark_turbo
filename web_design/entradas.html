<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>entradas html</title>
</head>
<body>
    <form >
        <!--O input é usado para criar controles interativos para formularios baseados na web/ junto do type(atributo)-->
        <input type="text" name="" id=""><br/><br/> <!--text: um campo de texto com uma so linha, quebra de linhas sao removidas automaticamente-->
        <input type="submit" value="Enviar"><br/><br/> <!--submit: Um botao que envia formulario-->
        <input type="file" name="" id=""><br/><br/> <!--file: permite ao usuario selecionar um arquivo-->
        <input type="date" name="" id=""><br/><br/> <!--data:controle para inserir uma data-->
        <input type="radio" name="" id=""><br/><br/> <!--radiO: Um botao de escolha-->
        <input type="range" name="" id=""><br/><br/> <!--ranger: um controle para inserir um numero cuja o valor exato nao importa-->
    </form>
</body>
</html>
